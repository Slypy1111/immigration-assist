name: Deploy to Vercel

on:
  workflow_dispatch:
  push:
    branches: [master, main]
    paths-ignore:
      - "**.md"
      - ".cursor/**"

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: github.repository == 'Slypy1111/immigration-assist'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - run: npm ci

      - name: Pull Vercel environment
        if: env.VERCEL_TOKEN != ''
        run: npx vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

      - name: Build
        run: npm run build
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          AUTH_MODE: dev
          NEXT_PUBLIC_AUTH_MODE: dev
          MOCK_AI: "true"
          NEXT_PUBLIC_APP_URL: ${{ secrets.NEXT_PUBLIC_APP_URL }}

      - name: Deploy to Vercel
        if: env.VERCEL_TOKEN != ''
        run: npx vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

      - name: Deploy skipped
        if: env.VERCEL_TOKEN == ''
        run: |
          echo "Set GitHub secrets VERCEL_TOKEN, VERCEL_ORG_ID, VERCEL_PROJECT_ID, DATABASE_URL, NEXT_PUBLIC_APP_URL"
          echo "Or import manually: https://vercel.com/new/clone?repository-url=https%3A%2F%2Fgithub.com%2FSlypy1111%2Fimmigration-assist"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
