services:
  postgres:
    image: postgres:16-alpine
    container_name: lawyer-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: lawyer
      POSTGRES_PASSWORD: lawyer_dev_password
      POSTGRES_DB: lawyer
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
